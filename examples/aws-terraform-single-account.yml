# ──────────────────────────────────────────────────────────────
# AWS Terraform — Single Account Deployment
# ──────────────────────────────────────────────────────────────
#
# Scenario: Platform team deploys EC2, RDS, VPC resources to a
#           single AWS account using OIDC (no long-lived keys).
#
# Pipeline:
#   On PR:    checkout → terraform plan → Cost Guardrails cost review
#   On merge: checkout → terraform plan → terraform apply
#
# Secrets needed:
#   COST_GUARDRAILS_API_KEY     — Cost Guardrails API key
#   COST_GUARDRAILS_BUDGET_CODE — Budget code from Cost Guardrails dashboard
#   AWS_ROLE_ARN          — IAM role for OIDC (arn:aws:iam::role/...)

name: "Infrastructure: Plan, Review & Deploy"

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_ROOT: terraform/environments/production
  AWS_REGION: us-east-1

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > plan.json

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-production
          path: ${{ env.TF_ROOT }}/plan.json
          retention-days: 5

  cost-review:
    name: "Cost Guardrails: Cost Review"
    needs: terraform-plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-production

      - name: Run Cost Guardrails
        uses: skyxops-io/cost-guardrails-action@v1
        with:
          plan-path: plan.json
          api-key: ${{ secrets.COST_GUARDRAILS_API_KEY }}
          budget-code: ${{ secrets.COST_GUARDRAILS_BUDGET_CODE }}

  deploy:
    name: "Terraform Apply"
    needs: terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Apply
        run: |
          terraform init -backend-config=backend.hcl
          terraform apply -auto-approve
